<!DOCTYPE html>
<html>
<head>
    <title>Swiftbook Admin</title>
    <style>
        body { background: #06080a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #15191d; padding: 20px; border-radius: 10px; border: 1px solid #ffb400; }
        input { padding: 10px; margin: 5px; width: 200px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #ffb400; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h2>MASTER ADMIN PANEL</h2>
    <div class="card">
        <h3>Create New ID</h3>
        <input id="u_name" placeholder="User Name">
        <input id="u_pass" placeholder="Password">
        <input id="u_pts" type="number" placeholder="Points (Pts)">
        <button onclick="addUser()">Create ID</button>
    </div>

    <table id="userTable">
        <tr><th>Username</th><th>Password</th><th>Points</th><th>Action</th></tr>
    </table>

    <script>
        function addUser() {
            const name = document.getElementById('u_name').value;
            const pts = document.getElementById('u_pts').value;
            if(!name || !pts) return alert("Fill all details");
            
            const table = document.getElementById('userTable');
            const row = table.insertRow(-1);
            row.innerHTML = `<td>${name}</td><td>******</td><td>${pts}</td><td><button style="background:red">Delete</button></td>`;
            alert("User ID Created Successfully!");
        }
    </script>
</body>
                                               </html>
