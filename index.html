<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWIFTBOOK PREMIUM</title>
    <style>
        :root { --gold: #ffb400; --bg: #06080a; --card: #15191d; --blue: #72bbef; --pink: #faa9ba; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* Login Section */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); width: 85%; max-width: 350px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: white; outline: none; }
        .login-btn { width: 95%; padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }

        /* Main Site (Hidden initially) */
        #main-site { display: none; }
        .nav { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--gold); font-size: 22px; font-weight: 900; }
        
        /* Match Cards */
        .match-card { background: var(--card); margin: 12px; border-radius: 10px; border: 1px solid #262d35; overflow: hidden; }
        .m-header { padding: 10px; background: #1e252d; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; border-bottom: 1px solid #000; }
        .odds-row { display: grid; grid-template-columns: 1fr 75px 75px; height: 50px; border-bottom: 1px solid #111; }
        .team-name { padding: 15px 10px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn { display: flex; align-items: center; justify-content: center; font-weight: bold; border-left: 1px solid #000; font-size: 16px; }
        .back { background: var(--blue); color: #000; }
        .lay { background: var(--pink); color: #000; }
        
        .status-msg { text-align: center; padding: 50px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color:var(--gold); margin-bottom:20px;">SWIFTBOOK</h1>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="login-btn" onclick="doLogin()">LOGIN</button>
            <p style="font-size:11px; color:#777; margin-top:15px;">Official Premium Exchange</p>
        </div>
    </div>

    <div id="main-site">
        <div class="nav">
            <div class="logo">SWIFTBOOK</div>
            <div style="font-size:12px;">Pts: <span id="user-pts" style="color:var(--gold)">5,000</span></div>
        </div>
        <div id="live-container">
            <div class="status-msg">Searching for Live Matches...</div>
        </div>
    </div>

    <script>
        // Login Logic
        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            // Default ID for Testing
            if(u === "test77" && p === "12345") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                fetchMatches();
                setInterval(fetchMatches, 3000); // 3 sec refresh
            } else {
                alert("Invalid Login!");
            }
        }

        // Live Rates Logic
        async function fetchMatches() {
            try {
                // Engine check
                const response = await fetch('/api/getMatches');
                const data = await response.json();
                
                if(!data || data.length === 0) {
                    document.getElementById('live-container').innerHTML = '<div class="status-msg">No Live Matches Right Now.</div>';
                    return;
                }

                let html = "";
                data.forEach(match => {
                    const p = match.split('|');
                    if(p[11]) { // Match Name exists
                        html += `
                        <div class="match-card">
                            <div class="m-header">
                                <span>🏏 ${p[11]}</span>
                                <span style="color:#0f0">● LIVE</span>
                            </div>
                            <div class="odds-row">
                                <div class="team-name">TEAM 1</div>
                                <div class="btn back">${p[1] || '--'}</div>
                                <div class="btn lay">${p[3] || '--'}</div>
                            </div>
                            <div class="odds-row">
                                <div class="team-name">TEAM 2</div>
                                <div class="btn back">${p[5] || '--'}</div>
                                <div class="btn lay">${p[7] || '--'}</div>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('live-container').innerHTML = html;
            } catch (error) {
                console.log("Engine Syncing...");
            }
        }
    </script>
</body>
    </html>
