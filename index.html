<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFTBOOK | LOGIN</title>
    <style>
        :root { --gold: #ffb400; --bg: #06080a; --card: #15191d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        #login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); width: 80%; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #222; color: white; }
        .btn-login { background: var(--gold); color: black; padding: 12px; width: 95%; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #main-site { display: none; }
        .nav { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; }
        .match-card { background: var(--card); margin: 12px; border-radius: 10px; border: 1px solid #222; }
        .odds-row { display: grid; grid-template-columns: 1fr 70px 70px; border-bottom: 1px solid #111; }
        .back { background: #72bbef; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .lay { background: #faa9ba; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2 style="color:var(--gold)">SWIFTBOOK</h2>
            <input type="text" id="username" placeholder="ID Name">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-login" onclick="checkLogin()">LOGIN</button>
            <p style="font-size: 12px; color: #666; margin-top: 15px;">Contact Admin for ID</p>
        </div>
    </div>

    <div id="main-site">
        <div class="nav">
            <div style="color:var(--gold); font-weight:900;">SWIFTBOOK LIVE</div>
            <div id="user-display">Pts: 0</div>
        </div>
        <div id="live-matches"></div>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Abhi ke liye humne ek default ID banayi hai testing ke liye
            if(u === "test77" && p === "12345") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                document.getElementById('user-display').innerText = "User: " + u + " | Pts: 5000";
                startRates();
            } else {
                alert("Galat ID ya Password! Admin se sampark karein.");
            }
        }

        async function startRates() {
            setInterval(async () => {
                try {
                    const res = await fetch('/api/getMatches');
                    const data = await res.json();
                    let html = "";
                    data.forEach(m => {
                        const p = m.split('|');
                        if(p[11]) {
                            html += `<div class="match-card">
                                <div style="padding:10px; font-weight:bold;">🏏 ${p[11]}</div>
                                <div class="odds-row"><div style="padding:10px;">Match Odds</div><div class="back">${p[1]||'--'}</div><div class="lay">${p[3]||'--'}</div></div>
                            </div>`;
                        }
                    });
                    document.getElementById('live-matches').innerHTML = html;
                } catch (e) { console.log("Re-syncing..."); }
            }, 2000);
        }
    </script>
</body>
</html>
