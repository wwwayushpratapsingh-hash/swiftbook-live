<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftbook - Live Only</title>
    <style>
        :root { --navy: #0a192f; --gold: #ffd700; --card: #112240; }
        body { background: var(--navy); color: white; font-family: sans-serif; margin: 0; }
        .header { background: var(--card); padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        
        /* Login Form */
        #login-screen { padding: 50px 20px; text-align: center; }
        input { width: 80%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #1d2d44; color: white; }
        .btn-login { background: var(--gold); color: black; padding: 15px 50px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 85%; font-size: 16px; }

        /* Match UI */
        #match-screen { display: none; padding: 15px; }
        .match-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .live-label { color: #00ff00; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .live-dot { height: 8px; width: 8px; background: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .score-display { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; color: #64ffda; font-size: 18px; text-align: center; margin: 15px 0; font-weight: bold; border: 1px solid #1d2d44; }
        .btn-box { display: flex; gap: 10px; }
        .bet-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; }
        
        .loading { text-align: center; color: #8892b0; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="header" style="margin-bottom: 30px; border-radius: 0 0 20px 20px;"><h1>SWIFTBOOK</h1></div>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-login" onclick="checkLogin()">SECURE LOGIN</button>
    </div>

    <div id="match-screen">
        <div class="header" style="margin-bottom: 20px; border-radius: 15px;"><h1>LIVE MATCHES</h1></div>
        <div id="display">
            <div class="loading">Searching for Live Cricket...</div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user === "demo" && pass === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('match-screen').style.display = 'block';
                fetchLive();
            } else { alert("Access Denied!"); }
        }

        async function fetchLive() {
            const display = document.getElementById('display');
            try {
                const res = await fetch('/api/getMatches');
                const matches = await res.json();

                if (!matches || matches.length === 0) {
                    display.innerHTML = '<div class="loading">No Matches are currently LIVE. Check back later.</div>';
                    return;
                }

                display.innerHTML = '';
                matches.forEach(m => {
                    display.innerHTML += `
                        <div class="match-card">
                            <div class="live-label"><span class="live-dot"></span> \${m.status}</div>
                            <h3>\${m.name}</h3>
                            <div class="score-display">\${m.score}</div>
                            <div class="btn-box">
                                <button class="bet-btn" style="background: #2ea44f;">BACK</button>
                                <button class="bet-btn" style="background: #da3633;">LAY</button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                display.innerHTML = '<div class="loading">Connection Error. Please Refresh.</div>';
            }
        }
        setInterval(fetchLive, 30000); // 30 sec auto-refresh
    </script>
</body>
</html>
